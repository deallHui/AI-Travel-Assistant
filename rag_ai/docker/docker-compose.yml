version: '3.8'

services:
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-travel-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEPLOY_ENV=production
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
      # 嵌入模型配置
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-siliconflow}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      # 向量数据库配置
      - VECTORSTORE_PATH=/app/vectorstores
      # HuggingFace 镜像配置
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    volumes:
      # 挂载向量数据库（持久化）
      - ../vectorstores:/app/vectorstores:ro
      # 挂载日志目录
      - ./logs:/app/logs
      # 挂载配置文件（可选）
      - ../deploy_config.py:/app/deploy_config.py:ro
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - rag-api
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  rag-logs:
    driver: local
